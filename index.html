    <style>
        :root {
            --homer-yellow: #FFD90F;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(255, 217, 15, 0.3), 0 0 30px rgba(255, 217, 15, 0.1);
        }
        .logo-glow {

        }
        .text-homer {

        }

            background-color: var(--homer-yellow);

            border-color: var(--homer-yellow);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--homer-yellow);
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-floating {
            animation: floating 3s ease-in-out infinite;
        }
    </style>
